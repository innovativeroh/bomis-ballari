    /* Premium Cinematic Scroll Animations */
    .scroll-section {
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .scroll-section.animate-in {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .scroll-text-reveal {
      opacity: 0;
      transform: translateY(30px);
      filter: blur(6px);
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), filter 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .scroll-text-reveal.animate-in {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    /* Testimonial Video Styling */
    .testimonial-item {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background: #000;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .testimonial-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    }
    .testimonial-item video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }
    .testimonial-item:hover video {
      opacity: 1;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.2);
      transition: opacity 0.3s ease;
    }
    .testimonial-item:hover .play-overlay {
      opacity: 0;
    }
    .no-js .scroll-section, .no-js .scroll-text-reveal {
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observerOptions = { threshold: 0.05 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
            observer.unobserve(entry.target);
          }
        });
      }, observerOptions);
      document.querySelectorAll('.scroll-section, .scroll-text-reveal').forEach(el => observer.observe(el));
    });
  </script>
