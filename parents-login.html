<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Portal Login | BOMIS Ballari</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-warm-gradient {
      background: linear-gradient(135deg, #fffcf8 0%, #ffe8d1 100%);
    }
    .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .blob-shape {
      position: absolute;
      filter: blur(40px);
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(226, 93, 42, 0.1);
      border-color: #e25d2a;
    }
  </style>
  <link rel="stylesheet" href="responsive.css">
<!-- Meta Pixel Code -->

/></noscript>

</head>
<body class="bg-[#F7F5F2] min-h-screen overflow-hidden">

  <!-- Main Container -->
  <div class="flex flex-col md:flex-row min-h-screen">
    
    <!-- Left Side: Illustration & Branding (60%) -->
    <div class="hidden md:flex md:w-3/5 bg-warm-gradient relative flex-col justify-center px-12 lg:px-24 overflow-hidden animate-fade-in">
      <!-- Decorative Blobs -->
      <div class="blob-shape w-64 h-64 bg-[#e25d2a]/20 top-[-50px] left-[-50px] rounded-full"></div>
      <div class="blob-shape w-80 h-80 bg-[#231F20]/5 bottom-[-100px] right-[-50px] rounded-full"></div>
      
      <!-- Content Wrapper -->
      <div class="relative z-10 max-w-2xl">
        <div class="mb-8 flex items-center gap-3">
          <img src="logo/birla-logo-new.png" alt="BOMIS Logo" class="h-14 w-auto" loading="lazy">
        </div>
        
        <h1 class="text-4xl lg:text-5xl font-bold text-[#1a1a1a] leading-tight mb-4">
          Welcome to the <span class="text-[#e25d2a]">Parent Portal</span>
        </h1>
        <p class="text-xl font-semibold text-[#1a1a1a]/80 mb-6">
          Stay connected, stay informed
        </p>
        <p class="text-lg text-[#1a1a1a]/60 max-w-md mb-12">
          Access your child's attendance, updates, and progress in one place.
        </p>
        
        <!-- Illustration -->
        <div class="relative w-full max-w-lg">
          <img src="assets/illustrations/parent-portal.png" alt="Parent and Child Learning" class="w-full h-auto drop-shadow-2xl hover:scale-[1.02] transition-transform duration-500" loading="lazy">
          
        </div>
      </div>
    </div>

    <!-- Right Side: Login Form (40%) -->
    <div class="w-full md:w-2/5 bg-white flex flex-col justify-center px-6 sm:px-12 lg:px-20 relative animate-slide-up">
      
      <!-- Mobile Logo (Visible only on small screens) -->
      <div class="md:hidden absolute top-8 left-6">
        <img src="logo/birla-logo-new.png" alt="BOMIS Logo" class="h-10 w-auto" loading="lazy">
      </div>

      <!-- Login Card -->
      <div class="w-full max-w-md mx-auto py-12 md:py-0">
        <div class="mb-10">
          <h2 class="text-3xl font-bold text-[#1a1a1a] mb-2">Parent Login</h2>
          <p class="text-[#1a1a1a]/50">Enter your credentials to access the portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
          <!-- Username Field -->
          <div>
            <label class="block text-sm font-semibold text-[#1a1a1a]/70 mb-2">Username / Email</label>
            <div class="relative">
              <input type="text" placeholder="name@example.com" class="w-full px-5 py-4 bg-[#f3f3f3] border-2 border-transparent rounded-[14px] transition-all duration-300 text-[#1a1a1a] placeholder:text-[#1a1a1a]/30">
              <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#1a1a1a]/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"/>
              </svg>
            </div>
          </div>

          <!-- Password Field -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-sm font-semibold text-[#1a1a1a]/70">Password</label>
              <a href="#" class="text-xs font-bold text-[#e25d2a] hover:underline">Forgot Password?</a>
            </div>
            <div class="relative">
              <input type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-[#f3f3f3] border-2 border-transparent rounded-[14px] transition-all duration-300 text-[#1a1a1a] placeholder:text-[#1a1a1a]/30">
              <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#1a1a1a]/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="flex items-center">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-[#f3f3f3] text-[#e25d2a] focus:ring-[#e25d2a]">
            <label for="remember" class="ml-2 text-sm text-[#1a1a1a]/60">Remember me for 30 days</label>
          </div>

          <!-- Login Button -->
          <button type="submit" class="w-full bg-[#e25d2a] hover:bg-[#c94d22] text-white font-bold py-4 rounded-full shadow-lg shadow-[#e25d2a]/20 hover:shadow-xl hover:shadow-[#e25d2a]/30 transition-all duration-300 transform hover:-translate-y-1 flex justify-center items-center gap-3 group">
            <span>Sign In</span>
            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>
        </form>

        <!-- Footer Info -->
        <div class="mt-12 text-center">
          <p class="text-sm text-[#1a1a1a]/40">
            &copy; 2026 Birla Open Minds. All rights reserved.<br>
            <a href="index.html" class="text-[#e25d2a] font-semibold hover:underline">Return to Home</a>
          </p>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      const originalText = btn.innerHTML;
      
      btn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div><span>Verifying...</span>';
      btn.disabled = true;

      // Simulate API call
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('This is a demonstration of the Parents Portal UI. Actual login functionality requires backend integration.');
      }, 1500);
    });
  </script>
</body>
</html>
