    body {

    /* Premium Cinematic Scroll Animations */
    .scroll-section {
      opacity: 0;
      transform: translateY(60px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .scroll-section.animate-in {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .scroll-text-reveal {
      opacity: 0;
      transform: translateY(30px);
      filter: blur(6px);
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), filter 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .scroll-text-reveal.animate-in {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    /* Gallery Hover Effects */
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(234, 88, 12, 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-item img, .gallery-item video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .gallery-item:hover img, .gallery-item:hover video {
      transform: scale(1.05);
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observerOptions = { threshold: 0.15 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
            observer.unobserve(entry.target);
          }
        });
      }, observerOptions);
      document.querySelectorAll('.scroll-section, .scroll-text-reveal').forEach(el => observer.observe(el));
    });
  </script>
